name: Install Forwarder Check

on:
  schedule:
    - cron: '17 7 * * *'
  push:
    branches: [dev]
    paths:
      - install.sh
      - install.ps1
      - .github/workflows/install-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # read each forwarder's target url straight from the script so the
      # check never drifts from what machlang.org/install.{sh,ps1} actually fetch
      - name: HEAD the forwarder targets
        run: |
          set -eu
          for f in install.sh install.ps1; do
            url=$(grep -oE 'https://[^"| ]+' "$f" | head -n1)
            echo "$f -> $url"
            curl -fsSIL -o /dev/null "$url"
          done
